# =============================================================
# Configuração do Spring Boot — arquivo lido automaticamente ao
# iniciar a aplicação (Spring procura por application.properties
# no classpath). Aqui ficam URI do banco, porta e context-path.
# =============================================================

# --- Conexão com MongoDB ---
# A URI define HOST:PORTA do servidor Mongo. O parâmetro
# directConnection=true desativa o auto-discovery de replica set
# (necessário na rede da UTFPR, onde só há um nó).

# === Servidor UTFPR (descomentar quando estiver na rede da UTFPR) ===
#spring.data.mongodb.uri=mongodb://develop-lds.td.utfpr.edu.br:27017/?directConnection=true
#spring.data.mongodb.database=agencia-noticias

# === MongoDB local (padrao para desenvolvimento) ===
spring.data.mongodb.uri=mongodb://localhost:27017
spring.data.mongodb.database=agencia-noticias

# Porta HTTP onde o Tomcat embarcado escuta requisições.
server.port=9091

# Prefixo de todas as URLs. Com isso, a home fica em
# http://localhost:9091/agencia.noticias/ em vez de
# http://localhost:9091/. Mantém compatibilidade com o reference
# do professor, que também usa esse contexto.
server.servlet.context-path=/agencia.noticias
