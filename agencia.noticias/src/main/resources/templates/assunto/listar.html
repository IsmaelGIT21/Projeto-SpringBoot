<!--
	assunto/listar.html
	===================
	Lista todos os Assuntos cadastrados, com ações de editar/remover.
	Estrutura idêntica ao autor/listar.html.
-->
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Listar Assuntos - Agência de Notícias Web</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

	<header th:replace="~{fragments/nav :: navbar}"></header>

	<main class="max-w-6xl mx-auto px-6 py-10 w-full flex-1">
		<div class="bg-white rounded-2xl shadow p-8">
			<div class="flex justify-between items-center mb-6">
				<h2 class="text-2xl font-bold text-gray-800">Assuntos Cadastrados</h2>
				<a href="cadastrarAssunto" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm">+ Novo Assunto</a>
			</div>

			<div th:if="${#lists.isEmpty(assuntos)}" class="text-center text-gray-500 py-8">
				Nenhum assunto cadastrado.
			</div>

			<table th:unless="${#lists.isEmpty(assuntos)}" class="w-full text-left">
				<thead>
					<tr class="bg-blue-700 text-white">
						<th class="p-3">Nome</th>
						<th class="p-3">Descrição</th>
						<th class="p-3 text-center">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="assunto : ${assuntos}" class="border-b hover:bg-gray-50">
						<td class="p-3" th:text="${assunto.nome}"></td>
						<td class="p-3" th:text="${assunto.descricao}"></td>
						<td class="p-3 text-center">
							<a th:href="@{/editarAssunto(id=${assunto.id})}" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">Editar</a>
							<a th:href="@{/removerAssunto(id=${assunto.id})}" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700" onclick="return confirm('Remover este assunto?')">Remover</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>

	<footer th:replace="~{fragments/nav :: footer}"></footer>

</body>
</html>
