<!--
	assunto/cadastrar.html
	======================
	Formulário de cadastro de Assunto (tema/categoria das notícias).
	Submete via POST para /cadastrarAssunto, tratado pelo AssuntoController.
-->
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastrar Assunto - Agência de Notícias Web</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

	<header th:replace="~{fragments/nav :: navbar}"></header>

	<main class="max-w-2xl mx-auto px-6 py-10 w-full flex-1">
		<div class="bg-white rounded-2xl shadow p-8">
			<h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Cadastro de Assunto</h2>

			<form method="POST" action="cadastrarAssunto" class="space-y-5">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Nome do assunto</label>
					<input type="text" name="nome" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
				</div>
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
					<!-- Descrição é livre (textarea), opcional (sem required). -->
					<textarea name="descricao" rows="4" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
				</div>
				<div class="flex justify-between items-center pt-3">
					<a href="/agencia.noticias/" class="text-blue-600 hover:underline">← Voltar</a>
					<button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Cadastrar</button>
				</div>
			</form>
		</div>
	</main>

	<footer th:replace="~{fragments/nav :: footer}"></footer>

</body>
</html>
