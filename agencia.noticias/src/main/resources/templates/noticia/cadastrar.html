<!--
	noticia/cadastrar.html
	======================
	Formulário de cadastro de Notícia.

	É o form mais rico do sistema: combina três <select> (autor,
	assunto, situação) com inputs de texto. Os selects são populados
	a partir de listas que o NoticiaController coloca no Model.
-->
<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastrar Notícia - Agência de Notícias Web</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

	<header th:replace="~{fragments/nav :: navbar}"></header>

	<main class="max-w-3xl mx-auto px-6 py-10 w-full flex-1">
		<div class="bg-white rounded-2xl shadow p-8">
			<h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Cadastro de Notícia</h2>

			<form method="POST" action="cadastrarNoticia" class="space-y-5">

				<!-- Select de autor: itera sobre a lista 'autores'.
				     th:value=${a.id} envia o ID; o controller usa esse
				     ID para preencher noticia.autorId via databinding. -->
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Autor da Notícia</label>
					<select name="autorId" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
						<option value="" disabled selected>Selecione o autor</option>
						<option th:each="a : ${autores}" th:value="${a.id}" th:text="${a.nome}"></option>
					</select>
				</div>

				<!-- Select de assunto: mesma lógica do autor. -->
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Assunto</label>
					<select name="assuntoId" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
						<option value="" disabled selected>Selecione o assunto</option>
						<option th:each="a : ${assuntos}" th:value="${a.id}" th:text="${a.nome}"></option>
					</select>
				</div>

				<!-- Select de situação: itera sobre o array Situacao.values().
				     Envia o NOME do enum (s.name()) — o Spring converte de
				     volta para o tipo Situacao no controller. -->
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Situação da Notícia</label>
					<select name="situacao" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
						<option value="" disabled selected>Selecione a situação</option>
						<option th:each="s : ${situacoes}" th:value="${s.name()}" th:text="${s.descricao}"></option>
					</select>
				</div>

				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
					<input type="text" name="titulo" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
				</div>
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Conteúdo da Notícia</label>
					<!-- O enunciado pede apenas texto na notícia — por isso usamos textarea simples. -->
					<textarea name="conteudo" rows="8" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
				</div>
				<div class="flex justify-between items-center pt-3">
					<a href="/agencia.noticias/" class="text-blue-600 hover:underline">← Voltar</a>
					<button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Cadastrar</button>
				</div>
			</form>
		</div>
	</main>

	<footer th:replace="~{fragments/nav :: footer}"></footer>

</body>
</html>
